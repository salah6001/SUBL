    <line x1="580" y1="258" x2="605" y2="258" stroke="#3a6018" stroke-width="2"/>
    <line x1="580" y1="345" x2="605" y2="345" stroke="#3a6018" stroke-width="2"/>
    <line x1="580" y1="420" x2="605" y2="420" stroke="#3a6018" stroke-width="2"/>
    <ellipse cx="580" cy="83" rx="40" ry="9" fill="#5a9828" transform="rotate(-30 580 83)" opacity="0.9"/>
    <ellipse cx="605" cy="168" rx="36" ry="8" fill="#4a8820" transform="rotate(25 605 168)" opacity="0.9"/>

    <!-- Stalk 8 -->
    <rect x="670" y="5" width="22" height="445" rx="11" fill="#6a9a30"/>
    <line x1="670" y1="90" x2="692" y2="90" stroke="#3a6018" stroke-width="2"/>
    <line x1="670" y1="178" x2="692" y2="178" stroke="#3a6018" stroke-width="2"/>
    <line x1="670" y1="265" x2="692" y2="265" stroke="#3a6018" stroke-width="2"/>
    <line x1="670" y1="352" x2="692" y2="352" stroke="#3a6018" stroke-width="2"/>
    <ellipse cx="692" cy="88" rx="35" ry="8" fill="#5a9828" transform="rotate(28 692 88)" opacity="0.9"/>
    <ellipse cx="670" cy="176" rx="38" ry="8" fill="#4a8820" transform="rotate(-24 670 176)" opacity="0.9"/>

    <!-- Stalk 9 -->
    <rect x="755" y="0" width="26" height="450" rx="13" fill="#80b040"/>
    <line x1="755" y1="80" x2="781" y2="80" stroke="#3a6018" stroke-width="2"/>
    <line x1="755" y1="165" x2="781" y2="165" stroke="#3a6018" stroke-width="2"/>
    <line x1="755" y1="252" x2="781" y2="252" stroke="#3a6018" stroke-width="2"/>
    <line x1="755" y1="340" x2="781" y2="340" stroke="#3a6018" stroke-width="2"/>
    <line x1="755" y1="418" x2="781" y2="418" stroke="#3a6018" stroke-width="2"/>
    <ellipse cx="755" cy="78" rx="38" ry="8" fill="#5a9828" transform="rotate(-26 755 78)" opacity="0.9"/>
    <ellipse cx="781" cy="163" rx="35" ry="8" fill="#4a8820" transform="rotate(20 781 163)" opacity="0.9"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="390" width="800" height="60" fill="url(#ground5)" rx="0"/>

  <!-- Path -->
  <polygon points="350,450 370,390 430,390 450,450" fill="url(#path5)" opacity="0.85"/>

  <!-- Ground moss / fallen leaves -->
  <ellipse cx="150" cy="420" rx="60" ry="15" fill="#3a6018" opacity="0.7"/>
  <ellipse cx="640" cy="415" rx="65" ry="16" fill="#3a6018" opacity="0.7"/>
  <ellipse cx="300" cy="430" rx="45" ry="12" fill="#4a7820" opacity="0.6"/>
  <ellipse cx="510" cy="428" rx="48" ry="12" fill="#4a7820" opacity="0.6"/>

  <!-- Dappled light on ground -->
  <ellipse cx="200" cy="410" rx="30" ry="12" fill="#c8e8a0" opacity="0.4"/>
  <ellipse cx="580" cy="405" rx="25" ry="10" fill="#c8e8a0" opacity="0.35"/>
  <ellipse cx="400" cy="400" rx="20" ry="8" fill="#d0f0b0" opacity="0.45"/>
</svg>
