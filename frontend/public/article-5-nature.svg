    <rect x="380" y="0" width="28" height="450" rx="14" fill="#80b040"/>
    <line x1="380" y1="75" x2="408" y2="75" stroke="#3a6018" stroke-width="2"/>
    <line x1="380" y1="160" x2="408" y2="160" stroke="#3a6018" stroke-width="2"/>
    <line x1="380" y1="248" x2="408" y2="248" stroke="#3a6018" stroke-width="2"/>
    <line x1="380" y1="338" x2="408" y2="338" stroke="#3a6018" stroke-width="2"/>
    <line x1="380" y1="415" x2="408" y2="415" stroke="#3a6018" stroke-width="2"/>
    <ellipse cx="380" cy="73" rx="42" ry="9" fill="#5a9828" transform="rotate(-32 380 73)" opacity="0.9"/>
    <ellipse cx="408" cy="158" rx="38" ry="8" fill="#4a8820" transform="rotate(28 408 158)" opacity="0.9"/>
    <ellipse cx="380" cy="246" rx="40" ry="9" fill="#5a9828" transform="rotate(-18 380 246)" opacity="0.9"/>

    <!-- Stalk 6 -->
    <rect x="490" y="15" width="23" height="435" rx="11" fill="#6a9a30"/>
    <line x1="490" y1="95" x2="513" y2="95" stroke="#3a6018" stroke-width="2"/>
    <line x1="490" y1="182" x2="513" y2="182" stroke="#3a6018" stroke-width="2"/>
    <line x1="490" y1="270" x2="513" y2="270" stroke="#3a6018" stroke-width="2"/>
    <line x1="490" y1="358" x2="513" y2="358" stroke="#3a6018" stroke-width="2"/>
    <ellipse cx="513" cy="93" rx="36" ry="8" fill="#5a9828" transform="rotate(25 513 93)" opacity="0.9"/>
    <ellipse cx="490" cy="180" rx="34" ry="7" fill="#4a8820" transform="rotate(-20 490 180)" opacity="0.9"/>
    <ellipse cx="513" cy="268" rx="37" ry="8" fill="#5a9828" transform="rotate(15 513 268)" opacity="0.9"/>

    <!-- Stalk 7 -->
    <rect x="580" y="0" width="25" height="450" rx="12" fill="#78a838"/>
