<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e8c0"/>
      <stop offset="100%" stop-color="#e8f4e0"/>
    </linearGradient>
    <linearGradient id="bamboo5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a8a30"/>
      <stop offset="40%" stop-color="#78b040"/>
      <stop offset="100%" stop-color="#4a7828"/>
    </linearGradient>
    <linearGradient id="ground5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7828"/>
      <stop offset="100%" stop-color="#2a4a14"/>
    </linearGradient>
    <linearGradient id="path5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8b890"/>
      <stop offset="100%" stop-color="#a89870"/>
    </linearGradient>
    <radialGradient id="lightbeam5" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#f0ffe0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0ffe0" stop-opacity="0"/>
    </radialGradient>
    <filter id="leafblur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background sky through canopy -->
  <rect width="800" height="450" fill="url(#sky5)"/>

  <!-- Light shaft -->
  <rect width="800" height="450" fill="url(#lightbeam5)"/>

  <!-- Far background bamboo (blurred, light) -->
  <g opacity="0.3" filter="url(#leafblur)">
    <rect x="50" y="0" width="18" height="450" rx="9" fill="#7ab038"/>
    <rect x="120" y="0" width="16" height="450" rx="8" fill="#6a9830"/>
    <rect x="200" y="0" width="20" height="450" rx="10" fill="#78a835"/>
    <rect x="320" y="0" width="17" height="450" rx="8" fill="#6a9830"/>
    <rect x="420" y="0" width="19" height="450" rx="9" fill="#7ab038"/>
    <rect x="550" y="0" width="16" height="450" rx="8" fill="#6a9830"/>
    <rect x="640" y="0" width="20" height="450" rx="10" fill="#78a835"/>
    <rect x="730" y="0" width="17" height="450" rx="8" fill="#7ab038"/>
  </g>

  <!-- Mid bamboo stalks -->
  <g>
