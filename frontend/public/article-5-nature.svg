    <line x1="290" y1="90" x2="310" y2="90" stroke="#3a6018" stroke-width="2"/>
    <line x1="290" y1="175" x2="310" y2="175" stroke="#3a6018" stroke-width="2"/>
    <line x1="290" y1="260" x2="310" y2="260" stroke="#3a6018" stroke-width="2"/>
    <line x1="290" y1="345" x2="310" y2="345" stroke="#3a6018" stroke-width="2"/>
    <ellipse cx="310" cy="88" rx="34" ry="7" fill="#5a9828" transform="rotate(22 310 88)" opacity="0.9"/>
    <ellipse cx="290" cy="173" rx="37" ry="8" fill="#4a8820" transform="rotate(-28 290 173)" opacity="0.9"/>

