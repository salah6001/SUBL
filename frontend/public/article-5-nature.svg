    <rect x="20" y="0" width="24" height="450" rx="12" fill="url(#bamboo5)"/>
    <line x1="20" y1="80" x2="44" y2="80" stroke="#3a6018" stroke-width="2"/>
    <line x1="20" y1="160" x2="44" y2="160" stroke="#3a6018" stroke-width="2"/>
    <line x1="20" y1="240" x2="44" y2="240" stroke="#3a6018" stroke-width="2"/>
    <line x1="20" y1="320" x2="44" y2="320" stroke="#3a6018" stroke-width="2"/>
    <line x1="20" y1="400" x2="44" y2="400" stroke="#3a6018" stroke-width="2"/>
    <!-- Leaves from stalk 1 -->
    <ellipse cx="44" cy="78" rx="35" ry="8" fill="#5a9828" transform="rotate(-30 44 78)" opacity="0.9"/>
    <ellipse cx="20" cy="158" rx="38" ry="8" fill="#4a8820" transform="rotate(25 20 158)" opacity="0.9"/>
    <ellipse cx="44" cy="238" rx="32" ry="7" fill="#5a9828" transform="rotate(-20 44 238)" opacity="0.9"/>

    <!-- Stalk 2 -->
    <rect x="100" y="20" width="22" height="430" rx="11" fill="#6a9a30"/>
    <line x1="100" y1="100" x2="122" y2="100" stroke="#3a6018" stroke-width="2"/>
    <line x1="100" y1="185" x2="122" y2="185" stroke="#3a6018" stroke-width="2"/>
    <line x1="100" y1="270" x2="122" y2="270" stroke="#3a6018" stroke-width="2"/>
    <line x1="100" y1="355" x2="122" y2="355" stroke="#3a6018" stroke-width="2"/>
    <ellipse cx="122" cy="98" rx="36" ry="8" fill="#5a9828" transform="rotate(28 122 98)" opacity="0.9"/>
    <ellipse cx="100" cy="183" rx="33" ry="7" fill="#4a8820" transform="rotate(-22 100 183)" opacity="0.9"/>
    <ellipse cx="122" cy="268" rx="35" ry="8" fill="#5a9828" transform="rotate(18 122 268)" opacity="0.9"/>

    <!-- Stalk 3 -->
    <rect x="185" y="0" width="26" height="450" rx="13" fill="#78a838"/>
    <line x1="185" y1="70" x2="211" y2="70" stroke="#3a6018" stroke-width="2"/>
    <line x1="185" y1="155" x2="211" y2="155" stroke="#3a6018" stroke-width="2"/>
    <line x1="185" y1="245" x2="211" y2="245" stroke="#3a6018" stroke-width="2"/>
    <line x1="185" y1="335" x2="211" y2="335" stroke="#3a6018" stroke-width="2"/>
    <line x1="185" y1="415" x2="211" y2="415" stroke="#3a6018" stroke-width="2"/>
    <ellipse cx="185" cy="68" rx="40" ry="9" fill="#5a9828" transform="rotate(-35 185 68)" opacity="0.9"/>
    <ellipse cx="211" cy="153" rx="36" ry="8" fill="#4a8820" transform="rotate(30 211 153)" opacity="0.9"/>
    <ellipse cx="185" cy="243" rx="38" ry="8" fill="#5a9828" transform="rotate(-15 185 243)" opacity="0.9"/>

    <!-- Stalk 4 -->
