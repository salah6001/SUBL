<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde8c8"/>
      <stop offset="60%" stop-color="#f9c97a"/>
      <stop offset="100%" stop-color="#e8a550"/>
    </linearGradient>
    <linearGradient id="mist1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8f0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff8f0" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="sunbeam" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#fff5d6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff5d6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a7a3a"/>
      <stop offset="100%" stop-color="#3a5a20"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#sky1)"/>

  <!-- Sun glow -->
  <ellipse cx="400" cy="10" rx="180" ry="120" fill="#fffbe0" opacity="0.5"/>

  <!-- Sunbeams -->
  <polygon points="400,0 340,450 380,450" fill="#fff5c0" opacity="0.18"/>
  <polygon points="400,0 360,450 395,450" fill="#fff5c0" opacity="0.14"/>
  <polygon points="400,0 405,450 440,450" fill="#fff5c0" opacity="0.16"/>
  <polygon points="400,0 420,450 460,450" fill="#fff5c0" opacity="0.12"/>
  <polygon points="400,0 310,450 355,450" fill="#fff5c0" opacity="0.10"/>
  <polygon points="400,0 450,450 490,450" fill="#fff5c0" opacity="0.10"/>

  <!-- Far background trees (blurry) -->
  <g filter="url(#blur1)" opacity="0.5">
    <rect x="0" y="180" width="800" height="60" fill="#4a6e2e"/>
    <ellipse cx="80" cy="180" rx="60" ry="80" fill="#3d6025"/>
    <ellipse cx="170" cy="170" rx="55" ry="90" fill="#4a7030"/>
    <ellipse cx="280" cy="175" rx="65" ry="85" fill="#3d6025"/>
    <ellipse cx="390" cy="165" rx="70" ry="95" fill="#4a7030"/>
    <ellipse cx="510" cy="172" rx="60" ry="88" fill="#3d6025"/>
    <ellipse cx="630" cy="168" rx="65" ry="92" fill="#4a7030"/>
    <ellipse cx="730" cy="175" rx="55" ry="82" fill="#3d6025"/>
  </g>

  <!-- Mid trees left -->
  <rect x="60" y="100" width="28" height="300" fill="#2d4a18" rx="4"/>
  <ellipse cx="74" cy="110" rx="52" ry="110" fill="#3a6020"/>
  <ellipse cx="74" cy="90" rx="42" ry="90" fill="#4a7a28"/>

  <!-- Mid trees right -->
  <rect x="700" y="80" width="30" height="320" fill="#2d4a18" rx="4"/>
  <ellipse cx="715" cy="90" rx="55" ry="120" fill="#3a6020"/>
  <ellipse cx="715" cy="70" rx="44" ry="95" fill="#4a7a28"/>

  <!-- Left foreground tree -->
  <rect x="-10" y="60" width="40" height="390" fill="#1e3510" rx="4"/>
  <ellipse cx="10" cy="70" rx="70" ry="130" fill="#2a5018"/>
  <ellipse cx="10" cy="40" rx="55" ry="105" fill="#356622"/>

  <!-- Right foreground tree -->
  <rect x="765" y="40" width="42" height="410" fill="#1e3510" rx="4"/>
  <ellipse cx="790" cy="55" rx="72" ry="135" fill="#2a5018"/>
  <ellipse cx="790" cy="28" rx="56" ry="108" fill="#356622"/>

  <!-- Centre-left tree -->
  <rect x="200" y="140" width="22" height="310" fill="#2a4015" rx="3"/>
  <ellipse cx="211" cy="148" rx="44" ry="100" fill="#325a20"/>
  <ellipse cx="211" cy="128" rx="35" ry="80" fill="#3e7028"/>

  <!-- Centre-right tree -->
  <rect x="560" y="130" width="24" height="320" fill="#2a4015" rx="3"/>
  <ellipse cx="572" cy="138" rx="46" ry="105" fill="#325a20"/>
  <ellipse cx="572" cy="118" rx="36" ry="82" fill="#3e7028"/>

  <!-- Ground / path -->
  <ellipse cx="400" cy="450" rx="400" ry="90" fill="#5a7a3a"/>
  <!-- Path -->
  <polygon points="340,450 380,280 420,280 460,450" fill="#c4a86a" opacity="0.9"/>
  <polygon points="355,450 388,295 412,295 445,450" fill="#d4b87a" opacity="0.7"/>

  <!-- Ground foliage -->
  <ellipse cx="120" cy="420" rx="90" ry="35" fill="#3a6020"/>
  <ellipse cx="680" cy="415" rx="95" ry="38" fill="#3a6020"/>
  <ellipse cx="250" cy="435" rx="70" ry="28" fill="#4a7028"/>
  <ellipse cx="560" cy="430" rx="75" ry="30" fill="#4a7028"/>

  <!-- Ferns left -->
  <ellipse cx="150" cy="390" rx="55" ry="22" fill="#4a8030" opacity="0.9"/>
  <ellipse cx="100" cy="400" rx="50" ry="20" fill="#5a9038" opacity="0.9"/>

  <!-- Ferns right -->
  <ellipse cx="650" cy="385" rx="58" ry="23" fill="#4a8030" opacity="0.9"/>
  <ellipse cx="700" cy="398" rx="52" ry="21" fill="#5a9038" opacity="0.9"/>

  <!-- Mist overlay -->
  <rect width="800" height="450" fill="url(#mist1)"/>

  <!-- Sunbeam overlay -->
  <rect width="800" height="450" fill="url(#sunbeam)" opacity="0.4"/>
</svg>
