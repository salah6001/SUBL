name: Build & Release Desktop Agent

# Push a tag like `agent-v1.0.0` to build the agent for all three desktop
# OSes and attach the binaries to a GitHub Release. Can also be run manually.
on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop-agent
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            extra: "--windowed"
            out: "dist/subl-agent.exe"
            asset: "subl-agent-windows.exe"
          - os: macos-latest
            extra: ""
            out: "dist/subl-agent"
            asset: "subl-agent-macos"
          - os: ubuntu-latest
            extra: ""
            out: "dist/subl-agent"
            asset: "subl-agent-linux"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-dev gcc libegl1 libxkbcommon0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build one-file executable
        run: >
          pyinstaller --onefile ${{ matrix.extra }} --name subl-agent
          --collect-all PySide6 --collect-all pynput __main__.py

      - name: Rename artifact
        shell: bash
        run: cp "${{ matrix.out }}" "${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: desktop-agent/${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop-agent/${{ matrix.asset }}
